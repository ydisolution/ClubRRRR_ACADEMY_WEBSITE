<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים ומיטאפים - ClubRRRR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #F4CE69;
            --dark-navy: #1E293B;
            --light-navy: #334155;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-white: #F8FAFC;
            --text-gray: #CBD5E1;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #3B82F6;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
        }

        /* Sidebar - נשתמש באותו עיצוב */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--dark-navy);
            padding: 30px 20px;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-gold);
            margin-bottom: 5px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: var(--text-gray);
        }

        .user-profile {
            background: var(--light-navy);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .user-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 3px solid var(--primary-gold);
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 13px;
            color: var(--text-gray);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            color: var(--text-gray);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--light-navy);
            color: var(--primary-gold);
        }

        .nav-link i {
            width: 20px;
            font-size: 18px;
        }

        .logout-btn {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-right: 280px;
            padding: 40px;
        }

        .page-header {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .page-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: var(--text-gray);
            font-size: 16px;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-label {
            color: var(--text-gray);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-gold);
        }

        /* Filters */
        .filters-section {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 14px;
            color: var(--text-gray);
        }

        .filter-select,
        .filter-input {
            padding: 12px 16px;
            background: var(--light-navy);
            border: 1px solid transparent;
            border-radius: 10px;
            color: var(--text-white);
            font-size: 14px;
            font-family: 'Heebo', sans-serif;
            transition: all 0.3s ease;
        }

        .filter-select:focus,
        .filter-input:focus {
            outline: none;
            border-color: var(--primary-gold);
        }

        .filter-select option {
            background: var(--light-navy);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--light-navy);
        }

        .tab {
            padding: 15px 30px;
            background: transparent;
            border: none;
            color: var(--text-gray);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--primary-gold);
            border-bottom-color: var(--primary-gold);
        }

        /* Events Grid */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(244, 206, 105, 0.2);
        }

        .event-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            position: relative;
        }

        .event-badges {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
        }

        .event-badge {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .event-badge.upcoming {
            background: rgba(16, 185, 129, 0.9);
        }

        .event-badge.popular {
            background: rgba(244, 206, 105, 0.9);
            color: var(--dark-navy);
        }

        .event-content {
            padding: 25px;
        }

        .event-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .event-description {
            color: var(--text-gray);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .event-meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .event-meta-icon {
            width: 20px;
            color: var(--primary-gold);
        }

        .event-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--light-navy);
        }

        .event-participants {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .participants-count {
            color: var(--primary-gold);
            font-weight: 600;
        }

        .event-progress {
            width: 100%;
            height: 6px;
            background: var(--light-navy);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .event-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-gold), #EFBB43);
            transition: width 0.3s ease;
        }

        .event-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary-gold), #EFBB43);
            color: var(--dark-navy);
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(244, 206, 105, 0.4);
        }

        .event-btn.registered {
            background: var(--success);
            color: white;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(100%);
            }

            .main-content {
                margin-right: 0;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 20px;
            }

            .filters-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">ClubRRRR</div>
            <div class="logo-subtitle">סוקרקין קלאבר פרימיום</div>
        </div>

        <div class="user-profile">
            <img src="" alt="User Avatar" class="user-avatar" id="userAvatar">
            <div class="user-name" id="userName">טוען...</div>
            <div class="user-email" id="userEmail">טוען...</div>
        </div>

        <nav>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="user-dashboard.html" class="nav-link">
                        <i class="fas fa-home"></i>
                        <span>דשבורד</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="investments.html" class="nav-link">
                        <i class="fas fa-chart-line"></i>
                        <span>השקעות</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="services.html" class="nav-link">
                        <i class="fas fa-briefcase"></i>
                        <span>שירותים</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="ai-tools.html" class="nav-link">
                        <i class="fas fa-robot"></i>
                        <span>כלים טכנולוגיים</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="academy.html" class="nav-link">
                        <i class="fas fa-graduation-cap"></i>
                        <span>ClubRRRR Academy</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="events.html" class="nav-link active">
                        <i class="fas fa-calendar-alt"></i>
                        <span>אירועים</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="community.html" class="nav-link">
                        <i class="fas fa-users"></i>
                        <span>קהילה</span>
                    </a>
                </li>
            </ul>
        </nav>

        <button class="logout-btn" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> התנתק
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Completion Banner -->
        <div id="completionBanner" style="background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.5);color:#10B981;padding:12px;border-radius:12px;margin-bottom:16px;display:none;">
            <i class="fas fa-check-circle"></i> פרופיל שלם! אתה מוכן להשתתף באירועים.
        </div>

        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title" id="eventsGreeting">אירועים ומיטאפים</h1>
            <p class="page-subtitle">השתתף באירועים מקצועיים וצור קשרים עם משקיעים אחרים</p>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">אירועים קרובים</div>
                <div class="stat-value" id="upcomingCount">10</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">השתתפויות שלי</div>
                <div class="stat-value" id="myEventsCount">0</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">חיפוש</label>
                    <input type="text" class="filter-input" placeholder="חפש לפי שם או תיאור..." id="searchInput">
                </div>
                <div class="filter-group">
                    <label class="filter-label">כל המיקומים</label>
                    <select class="filter-select" id="locationFilter">
                        <option value="">כל המיקומים</option>
                        <option value="online">אירוע מקוון</option>
                        <option value="miami">מיאמי, פלורידה</option>
                        <option value="lasvegas">לאס וגאס</option>
                        <option value="usa">ארה"ב</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">כל הסטטוסים</label>
                    <select class="filter-select" id="statusFilter">
                        <option value="">כל הסטטוסים</option>
                        <option value="upcoming">אירועים קרובים</option>
                        <option value="past">אירועים שהיו</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="upcoming">אירועים קרובים</button>
            <button class="tab" data-tab="past">אירועים שהיו</button>
        </div>

        <!-- Events Grid -->
        <div class="events-grid" id="eventsGrid">
            <!-- Events will be loaded here by JavaScript -->
        </div>
    </main>

    <!-- Auth Guard -->
    <script src="auth-guard.js"></script>

    <script>
        // Sample events data
        const eventsData = [
            {
                id: 1,
                title: "כנס נדל\"ן שנתי - לאס וגאס MGM",
                description: "הכנס השנתי הגדול ביותר למשקיעי נדל\"ן! עם מרצים מובילים, סדנאות מעשיות וזמן התרגמלינג נטוורקינג",
                image: "https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=500",
                date: "10/03/2024",
                time: "09:00",
                location: "גרנד, לאס וגאס MGM",
                type: "כנס",
                status: "upcoming",
                participants: 312,
                maxParticipants: 500,
                badges: ["קרוב", "פופולרי"]
            },
            {
                id: 2,
                title: "ובינר: מיסוי נדל\"ן בארה\"ב",
                description: "הרצאה מקיפה על אסטרטגיות מיסוי למשקיעי נדל\"ן זרים בארה\"ב, כולל 1031 Exchange וטכניקות אופטימיזציה מיסויית",
                image: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=500",
                date: "20/02/2024",
                time: "21:00",
                location: "אירוע מקוון",
                type: "ובינר",
                status: "upcoming",
                participants: 88,
                maxParticipants: 200,
                badges: ["קרוב"]
            },
            {
                id: 3,
                title: "מיטאפ משקיעי נדל\"ן מיאמי",
                description: "מפגש רבעוני של חברי הקהילה במיאמי! נציון, נטוורקינג וכלימה על השוק המקומי",
                image: "https://images.unsplash.com/photo-1511578314322-379afb476865?w=500",
                date: "15/02/2024",
                time: "19:00",
                location: "מלון פור סיזון מיאמי",
                type: "מיטאפ",
                status: "upcoming",
                participants: 24,
                maxParticipants: 50,
                badges: ["קרוב"]
            }
        ];

        // Load user data
        function loadUserData() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').src = user.avatar;
                document.getElementById('eventsGreeting').textContent = `אירועים ומיטאפים | ${user.name.split(' ')[0]}`;
                
                // Show banner if profile complete
                if (user.phone) {
                    document.getElementById('completionBanner').style.display = 'block';
                }
                
                // Load registered events from localStorage
                const registered = JSON.parse(localStorage.getItem('clubrrrr_events_registered') || '[]');
                document.getElementById('myEventsCount').textContent = registered.length;
            }
        }

        // Render events
        function renderEvents(events) {
            const grid = document.getElementById('eventsGrid');
            
            if (events.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: var(--text-gray); grid-column: 1/-1;">לא נמצאו אירועים</p>';
                return;
            }

            grid.innerHTML = events.map(event => {
                const progress = (event.participants / event.maxParticipants) * 100;
                const badgesHTML = event.badges.map(badge => 
                    `<span class="event-badge ${badge === 'קרוב' ? 'upcoming' : 'popular'}">${badge}</span>`
                ).join('');

                return `
                    <div class="event-card">
                        <div style="position: relative;">
                            <img src="${event.image}" alt="${event.title}" class="event-image">
                            <div class="event-badges">${badgesHTML}</div>
                        </div>
                        <div class="event-content">
                            <h3 class="event-title">${event.title}</h3>
                            <p class="event-description">${event.description}</p>
                            <div class="event-meta">
                                <div class="event-meta-item">
                                    <i class="fas fa-calendar event-meta-icon"></i>
                                    <span>${event.date}</span>
                                </div>
                                <div class="event-meta-item">
                                    <i class="fas fa-clock event-meta-icon"></i>
                                    <span>${event.time}</span>
                                </div>
                                <div class="event-meta-item">
                                    <i class="fas fa-map-marker-alt event-meta-icon"></i>
                                    <span>${event.location}</span>
                                </div>
                            </div>
                            <div class="event-footer">
                                <div class="event-participants">
                                    <i class="fas fa-users"></i>
                                    <span>משתתפים</span>
                                    <span class="participants-count">${event.participants}/${event.maxParticipants}</span>
                                    <div class="event-progress">
                                        <div class="event-progress-bar" style="width: ${progress}%"></div>
                                    </div>
                                </div>
                            </div>
                            <button class="event-btn" onclick="registerForEvent(${event.id})">
                                <i class="fas fa-calendar-plus"></i>
                                <span>הרשם לאירוע</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Register for event
        function registerForEvent(eventId) {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return; }
            if (!user.phone) { alert('נא להשלים את הפרופיל שלך קודם'); window.location.href = 'profile.html'; return; }
            
            const registered = JSON.parse(localStorage.getItem('clubrrrr_events_registered') || '[]');
            if (!registered.includes(eventId)) {
                registered.push(eventId);
                localStorage.setItem('clubrrrr_events_registered', JSON.stringify(registered));
                document.getElementById('myEventsCount').textContent = registered.length;
                alert(`נרשמת בהצלחה לאירוע!`);
                location.reload();
            } else {
                alert('אתה כבר רשום לאירוע זה');
            }
        }

        // Filter events
        function filterEvents() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const location = document.getElementById('locationFilter').value;
            const status = document.getElementById('statusFilter').value;
            const activeTab = document.querySelector('.tab.active').dataset.tab;

            let filtered = eventsData.filter(event => {
                const matchSearch = !search || 
                    event.title.toLowerCase().includes(search) || 
                    event.description.toLowerCase().includes(search);
                const matchLocation = !location || event.location.toLowerCase().includes(location.toLowerCase());
                const matchStatus = !status || event.status === status;
                const matchTab = event.status === activeTab;

                return matchSearch && matchLocation && matchStatus && matchTab;
            });

            renderEvents(filtered);
        }

        // Tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                filterEvents();
            });
        });

        // Search and filters
        document.getElementById('searchInput').addEventListener('input', filterEvents);
        document.getElementById('locationFilter').addEventListener('change', filterEvents);
        document.getElementById('statusFilter').addEventListener('change', filterEvents);

        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            renderEvents(eventsData);
        });
    </script>
</body>
</html>
