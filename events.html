<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים - ClubRRRR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold-color: #DFB249;
            --dark-bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #FFFFFF;
            --text-gray: #CCCCCC;
        }
        
        body {
            font-family: 'Jost', sans-serif;
            background: var(--dark-bg);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .main-header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(18px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold-color);
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            padding: 10px 0;
            display: block;
        }

        .nav-menu a:hover {
            color: var(--gold-color);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 0;
            width: 0;
            height: 2px;
            background: var(--gold-color);
            transition: width 0.3s;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--gold-color) 0%, #F4D88A 100%);
            color: var(--dark-bg) !important;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .logout-btn::after {
            display: none !important;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(223, 178, 73, 0.4);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 1s ease-out;
        }

        .section-header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .section-header p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 700px;
            margin: 0 auto;
        }

        /* Events Grid */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .event-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .event-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(223, 178, 73, 0.15);
            border-color: var(--gold-color);
        }

        .event-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, rgba(223, 178, 73, 0.2) 0%, rgba(223, 178, 73, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            position: relative;
        }

        .event-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold-color);
            color: var(--dark-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .event-content {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .event-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-white);
        }

        .event-description {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.5;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .event-meta {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(223, 178, 73, 0.2);
            margin-bottom: 16px;
        }

        .event-meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-gray);
        }

        .event-meta-icon {
            color: var(--gold-color);
            width: 16px;
            text-align: center;
        }

        .event-participants {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .event-participants-count {
            color: var(--gold-color);
            font-weight: 600;
        }

        .event-progress {
            width: 100%;
            height: 5px;
            background: rgba(223, 178, 73, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .event-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-color), #F4D88A);
        }

        .event-btn {
            background: transparent;
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
            padding: 11px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
            display: inline-block;
        }

        .event-btn:hover {
            background: var(--gold-color);
            color: var(--dark-bg);
        }

        .event-btn i {
            margin-left: 6px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 40px 20px;
            }

            .header-container {
                padding: 0 20px;
            }

            .section-header h1 {
                font-size: 32px;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-text">ClubRRRR</div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="dashboard.new.html"><i class="fas fa-home"></i> דשבורד</a></li>
                    <li><a href="investments.new.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
                    <li><a href="services.new.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
                    <li><a href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
                    <li><a href="events.new.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
                    <li><a href="community.html"><i class="fas fa-users"></i> קהילה</a></li>
                    <li><a href="profile.html"><i class="fas fa-user"></i> פרופיל</a></li>
                    <li><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="section-header">
            <h1>אירועים וכנסים</h1>
            <p>הצטרף לאירועים בלעדיים לחברי ClubRRRR</p>
        </section>

        <div class="events-grid" id="eventsGrid"></div>
    </main>

    <script src="auth-guard.js"></script>
    <script>
        const events = [
            {
                icon: '🎤',
                title: 'כנס השקעות נדל"ן בארה"ב',
                description: 'כנס בינלאומי שיכסה את המגמות העדכניות ביותר בנדל"ן בארה"ב',
                date: '2026-02-15',
                time: '19:00',
                location: 'תל אביב',
                participants: 234,
                capacity: 78
            },
            {
                icon: '💼',
                title: 'סדנה: סטרטגיות מימון יצרתיות',
                description: 'למד טכניקות מימון מתקדמות להגדלת תשואות בעסקאות שלך',
                date: '2026-02-20',
                time: '18:00',
                location: 'Zoom',
                participants: 156,
                capacity: 45
            },
            {
                icon: '🏘️',
                title: 'ביקור אתרים: מרכזי קניות בטקסס',
                description: 'טיול בשדה לאתרי השקעה פוטנציאליים בטקסס',
                date: '2026-02-28',
                time: '09:00',
                location: 'אוסטין, טקסס',
                participants: 89,
                capacity: 62
            },
            {
                icon: '📊',
                title: 'וובינר: ניתוח שוק ודוחות כלכליים',
                description: 'כלים וטכניקות לניתוח השוק כדי למצוא הזדמנויות מוצלחות',
                date: '2026-03-05',
                time: '20:00',
                location: 'Zoom',
                participants: 312,
                capacity: 89
            }
        ];

        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            grid.innerHTML = events.map(e => `
                <div class="event-card">
                    <div class="event-image">
                        ${e.icon}
                        <div class="event-badge">${new Date(e.date).toLocaleDateString('he-IL')}</div>
                    </div>
                    <div class="event-content">
                        <div class="event-title">${e.title}</div>
                        <div class="event-description">${e.description}</div>
                        
                        <div class="event-meta">
                            <div class="event-meta-item">
                                <span class="event-meta-icon"><i class="fas fa-clock"></i></span>
                                <span>${e.time}</span>
                            </div>
                            <div class="event-meta-item">
                                <span class="event-meta-icon"><i class="fas fa-map-marker-alt"></i></span>
                                <span>${e.location}</span>
                            </div>
                        </div>

                        <div class="event-participants">
                            <i class="fas fa-users" style="color: var(--gold-color);"></i>
                            <span class="event-participants-count">${e.participants}</span>
                            <span>משתתפים כבר רשומים</span>
                        </div>

                        <div class="event-progress">
                            <div class="event-progress-bar" style="width: ${e.capacity}%"></div>
                        </div>

                        <button class="event-btn" onclick="alert('ההרשמה תתווסף בקרוב')">
                            <i class="fas fa-arrow-left"></i> הירשם לאירוע
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function logout() {
            if (typeof logoutUser === 'function') {
                logoutUser();
            }
        }

        document.addEventListener('DOMContentLoaded', renderEvents);
    </script>
</body>
</html>
