<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משתמשים - ClubRRRR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #F4CE69;
            --dark-navy: #1E293B;
            --light-navy: #334155;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-white: #F8FAFC;
            --text-gray: #CBD5E1;
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light-navy);
        }

        .header h1 {
            font-size: 2rem;
            color: var(--primary-gold);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(244, 206, 105, 0.15);
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(244, 206, 105, 0.25);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--light-navy);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-gold);
        }

        .users-table-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--light-navy);
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .table-header h2 {
            font-size: 1.5rem;
            color: var(--text-white);
        }

        .search-box {
            padding: 10px 15px;
            background: var(--bg-dark);
            border: 1px solid var(--light-navy);
            border-radius: 8px;
            color: var(--text-white);
            width: 300px;
            font-size: 14px;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table thead {
            background: var(--bg-dark);
        }

        .users-table th {
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: var(--text-gray);
            border-bottom: 2px solid var(--light-navy);
        }

        .users-table td {
            padding: 15px;
            border-bottom: 1px solid var(--light-navy);
        }

        .users-table tr:hover {
            background: rgba(244, 206, 105, 0.05);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--bg-dark);
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: var(--text-white);
        }

        .user-email {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .role-badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .role-admin {
            background: rgba(244, 206, 105, 0.2);
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
        }

        .role-user {
            background: rgba(203, 213, 225, 0.2);
            color: var(--text-gray);
            border: 1px solid var(--text-gray);
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #3B82F6;
            border: 1px solid #3B82F6;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .btn-promote {
            background: rgba(244, 206, 105, 0.2);
            color: var(--primary-gold);
            border: 1px solid var(--primary-gold);
        }

        .btn-promote:hover {
            background: rgba(244, 206, 105, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--light-navy);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 1.5rem;
            color: var(--primary-gold);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-gray);
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 1px solid var(--light-navy);
            border-radius: 8px;
            color: var(--text-white);
            font-size: 14px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-save {
            background: var(--primary-gold);
            color: var(--bg-dark);
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-save:hover {
            background: #E5BE58;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-gray);
            padding: 10px 20px;
            border: 1px solid var(--light-navy);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: var(--light-navy);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-gray);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--light-navy);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-users"></i>
                ניהול משתמשים
            </h1>
            <a href="user-dashboard.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
                חזור לדשבורד
            </a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>סך המשתמשים</h3>
                <div class="value" id="totalUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>מנהלים</h3>
                <div class="value" id="totalAdmins">0</div>
            </div>
            <div class="stat-card">
                <h3>משתמשים רגילים</h3>
                <div class="value" id="totalRegularUsers">0</div>
            </div>
            <div class="stat-card">
                <h3>משתמשים חדשים החודש</h3>
                <div class="value" id="newUsersThisMonth">0</div>
            </div>
        </div>

        <div class="users-table-container">
            <div class="table-header">
                <h2>רשימת משתמשים</h2>
                <input type="text" class="search-box" id="searchBox" placeholder="חפש לפי שם או אימייל...">
            </div>

            <table class="users-table">
                <thead>
                    <tr>
                        <th>משתמש</th>
                        <th>תאריך הצטרפות</th>
                        <th>תפקיד</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>עריכת משתמש</h3>
                <button class="close-modal" onclick="closeEditModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>שם מלא</label>
                    <input type="text" id="editUserName" required>
                </div>
                <div class="form-group">
                    <label>אימייל</label>
                    <input type="email" id="editUserEmail" required>
                </div>
                <div class="form-group">
                    <label>תפקיד</label>
                    <select id="editUserRole">
                        <option value="user">משתמש רגיל</option>
                        <option value="admin">מנהל</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" onclick="closeEditModal()">ביטול</button>
                    <button type="submit" class="btn-save">שמור שינויים</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth-guard.js"></script>
    <script>
        // Load users on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user is admin
            if (!isAdmin()) {
                alert('אין לך הרשאה לגשת לעמוד זה');
                window.location.href = 'user-dashboard.html';
                return;
            }

            loadUsers();
            updateStats();

            // Search functionality
            document.getElementById('searchBox').addEventListener('input', function() {
                loadUsers(this.value);
            });

            // Edit form submit
            document.getElementById('editUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveUserChanges();
            });
        });

        function loadUsers(searchTerm = '') {
            const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
            const tableBody = document.getElementById('usersTableBody');
            
            // Filter users based on search
            let filteredUsers = users;
            if (searchTerm) {
                filteredUsers = users.filter(user => 
                    user.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    user.email.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            if (filteredUsers.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fas fa-users-slash"></i>
                                <p>לא נמצאו משתמשים</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = filteredUsers.map(user => {
                const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
                const memberDate = new Date(user.memberSince).toLocaleDateString('he-IL');
                const isCurrentUser = getCurrentUser()?.email === user.email;
                
                return `
                    <tr>
                        <td>
                            <div class="user-info">
                                <div class="user-avatar">${initials}</div>
                                <div class="user-details">
                                    <span class="user-name">${user.name}</span>
                                    <span class="user-email">${user.email}</span>
                                </div>
                            </div>
                        </td>
                        <td>${memberDate}</td>
                        <td>
                            <span class="role-badge role-${user.role}">
                                ${user.role === 'admin' ? 'מנהל' : 'משתמש'}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-edit" onclick="editUser('${user.id}')">
                                    <i class="fas fa-edit"></i> ערוך
                                </button>
                                ${user.role !== 'admin' ? `
                                    <button class="btn btn-promote" onclick="promoteToAdmin('${user.id}')">
                                        <i class="fas fa-crown"></i> הפוך למנהל
                                    </button>
                                ` : user.role === 'admin' && !isCurrentUser ? `
                                    <button class="btn btn-delete" onclick="demoteFromAdmin('${user.id}')">
                                        <i class="fas fa-user"></i> הסר ניהול
                                    </button>
                                ` : ''}
                                ${!isCurrentUser ? `
                                    <button class="btn btn-delete" onclick="deleteUser('${user.id}')">
                                        <i class="fas fa-trash"></i> מחק
                                    </button>
                                ` : ''}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats() {
            const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
            const admins = users.filter(u => u.role === 'admin');
            const regularUsers = users.filter(u => u.role !== 'admin');
            
            // New users this month
            const now = new Date();
            const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            const newUsers = users.filter(u => new Date(u.memberSince) >= firstDayOfMonth);

            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('totalAdmins').textContent = admins.length;
            document.getElementById('totalRegularUsers').textContent = regularUsers.length;
            document.getElementById('newUsersThisMonth').textContent = newUsers.length;
        }

        function editUser(userId) {
            const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
            const user = users.find(u => u.id === userId);
            
            if (user) {
                document.getElementById('editUserId').value = user.id;
                document.getElementById('editUserName').value = user.name;
                document.getElementById('editUserEmail').value = user.email;
                document.getElementById('editUserRole').value = user.role;
                document.getElementById('editModal').classList.add('active');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveUserChanges() {
            const userId = document.getElementById('editUserId').value;
            const name = document.getElementById('editUserName').value;
            const email = document.getElementById('editUserEmail').value;
            const role = document.getElementById('editUserRole').value;

            const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
            const userIndex = users.findIndex(u => u.id === userId);

            if (userIndex !== -1) {
                users[userIndex].name = name;
                users[userIndex].email = email;
                users[userIndex].role = role;
                
                localStorage.setItem('clubrrrr_users', JSON.stringify(users));
                
                closeEditModal();
                loadUsers();
                updateStats();
                
                alert('המשתמש עודכן בהצלחה!');
            }
        }

        function promoteToAdmin(userId) {
            if (confirm('האם אתה בטוח שברצונך להפוך משתמש זה למנהל?')) {
                const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
                const user = users.find(u => u.id === userId);
                
                if (user) {
                    user.role = 'admin';
                    localStorage.setItem('clubrrrr_users', JSON.stringify(users));
                    loadUsers();
                    updateStats();
                    alert('המשתמש הועלה לתפקיד מנהל!');
                }
            }
        }

        function demoteFromAdmin(userId) {
            if (confirm('האם אתה בטוח שברצונך להסיר הרשאות ניהול ממשתמש זה?')) {
                const users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
                const user = users.find(u => u.id === userId);
                
                if (user) {
                    user.role = 'user';
                    localStorage.setItem('clubrrrr_users', JSON.stringify(users));
                    loadUsers();
                    updateStats();
                    alert('הרשאות הניהול הוסרו מהמשתמש!');
                }
            }
        }

        function deleteUser(userId) {
            if (confirm('האם אתה בטוח שברצונך למחוק משתמש זה? פעולה זו אינה ניתנת לביטול.')) {
                let users = JSON.parse(localStorage.getItem('clubrrrr_users') || '[]');
                users = users.filter(u => u.id !== userId);
                localStorage.setItem('clubrrrr_users', JSON.stringify(users));
                loadUsers();
                updateStats();
                alert('המשתמש נמחק בהצלחה!');
            }
        }
    </script>
</body>
</html>
