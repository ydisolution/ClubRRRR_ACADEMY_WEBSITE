<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עסקאות להשקעה - ClubRRRR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold-color: #DFB249;
            --dark-bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #FFFFFF;
            --text-gray: #CCCCCC;
        }
        
        body {
            font-family: 'Jost', sans-serif;
            background: var(--dark-bg);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .main-header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(18px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold-color);
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            padding: 10px 0;
            display: block;
        }

        .nav-menu a:hover {
            color: var(--gold-color);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 0;
            width: 0;
            height: 2px;
            background: var(--gold-color);
            transition: width 0.3s;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--gold-color) 0%, #F4D88A 100%);
            color: var(--dark-bg) !important;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .logout-btn::after {
            display: none !important;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(223, 178, 73, 0.4);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 1s ease-out;
        }

        .section-header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .section-header p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 700px;
            margin: 0 auto;
        }

        /* Deal Cards Grid */
        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .deal-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .deal-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(223, 178, 73, 0.15);
            border-color: var(--gold-color);
        }

        .deal-image {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, rgba(223, 178, 73, 0.2) 0%, rgba(223, 178, 73, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }

        .deal-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--gold-color);
            color: var(--dark-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .deal-content {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .deal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-white);
        }

        .deal-location {
            font-size: 14px;
            color: var(--text-gray);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .deal-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(223, 178, 73, 0.2);
        }

        .deal-stat {
            text-align: center;
        }

        .deal-stat-label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .deal-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--gold-color);
        }

        .progress-container {
            margin-bottom: 20px;
        }

        .progress-label {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(223, 178, 73, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-color), #F4D88A);
            border-radius: 10px;
        }

        .deal-btn {
            background: transparent;
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
            padding: 12px 24px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }

        .deal-btn:hover {
            background: var(--gold-color);
            color: var(--dark-bg);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 40px 20px;
            }

            .header-container {
                padding: 0 20px;
            }

            .section-header h1 {
                font-size: 32px;
            }

            .deals-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-text">ClubRRRR</div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="dashboard.new.html"><i class="fas fa-home"></i> דשבורד</a></li>
                    <li><a href="investments.new.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
                    <li><a href="services.new.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
                    <li><a href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
                    <li><a href="events.new.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
                    <li><a href="community.html"><i class="fas fa-users"></i> קהילה</a></li>
                    <li><a href="profile.html"><i class="fas fa-user"></i> פרופיל</a></li>
                    <li><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="section-header">
            <h1>עסקאות להשקעה</h1>
            <p>בחר מהזדמנויות ההשקעה המומלצות שלנו בארה"ב</p>
        </section>

        <div class="deals-grid" id="dealsGrid"></div>
    </main>

    <script src="auth-guard.js"></script>
    <script>
        const deals = [
            {
                icon: '🏪',
                title: 'מרכז קניות בטקסס',
                location: 'אוסטין, טקסס',
                yield: '14%',
                price: '$5.0M',
                capacity: 65,
                duration: '3-5 שנים'
            },
            {
                icon: '🏢',
                title: 'קומפלקס מגורים בפלורידה',
                location: 'מיאמי, פלורידה',
                yield: '12%',
                price: '$2.5M',
                capacity: 45,
                duration: '4-6 שנים'
            },
            {
                icon: '🏗️',
                title: 'פרויקט פיתוח דיור',
                location: 'אטלנטה, ג\'ורג\'יה',
                yield: '18%',
                price: '$8.0M',
                capacity: 85,
                duration: '2-3 שנים'
            },
            {
                icon: '🏭',
                title: 'מחסן טכנולוגי חדש',
                location: 'דלאס, טקסס',
                yield: '11%',
                price: '$3.2M',
                capacity: 40,
                duration: '5-7 שנים'
            }
        ];

        function renderDeals() {
            const grid = document.getElementById('dealsGrid');
            grid.innerHTML = deals.map(d => `
                <div class="deal-card">
                    <div class="deal-image">
                        ${d.icon}
                        <div class="deal-badge">${d.yield} תשואה</div>
                    </div>
                    <div class="deal-content">
                        <div class="deal-title">${d.title}</div>
                        <div class="deal-location">
                            <i class="fas fa-map-marker-alt" style="color: var(--gold-color);"></i>
                            ${d.location}
                        </div>
                        
                        <div class="deal-stats">
                            <div class="deal-stat">
                                <div class="deal-stat-label">השקעה</div>
                                <div class="deal-stat-value">${d.price}</div>
                            </div>
                            <div class="deal-stat">
                                <div class="deal-stat-label">משך</div>
                                <div class="deal-stat-value">${d.duration}</div>
                            </div>
                        </div>

                        <div class="progress-container">
                            <div class="progress-label">
                                <span>קיבולת</span>
                                <span>${d.capacity}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${d.capacity}%"></div>
                            </div>
                        </div>

                        <button class="deal-btn" onclick="alert('בדיקת נאותות תתווסף בקרוב')">
                            צפה בפרטים →
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function logout() {
            if (typeof logoutUser === 'function') {
                logoutUser();
            }
        }

        document.addEventListener('DOMContentLoaded', renderDeals);
    </script>
</body>
</html>
