<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השקעות - ClubRRRR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold:#F4CE69; --dark-navy:#1E293B; --light-navy:#334155; --bg-dark:#0F172A; --card-bg:#1E293B; --text-white:#F8FAFC; --text-gray:#CBD5E1; }
        body { font-family:'Heebo',sans-serif; background:var(--bg-dark); color:var(--text-white); }
        .sidebar{position:fixed;right:0;top:0;width:280px;height:100vh;background:var(--dark-navy);padding:30px 20px;overflow-y:auto}
        .logo{font-size:28px;font-weight:800;color:var(--primary-gold);text-align:center;margin-bottom:10px}
        .nav-menu{list-style:none}
        .nav-link{display:flex;align-items:center;gap:12px;padding:14px 18px;color:var(--text-gray);text-decoration:none;border-radius:12px}
        .nav-link:hover,.nav-link.active{background:var(--light-navy);color:var(--primary-gold)}
        .logout-btn{margin-top:20px;width:100%;padding:14px;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid #EF4444;border-radius:12px;cursor:pointer}
        .main{margin-right:280px;padding:40px}
        .header{background:var(--card-bg);padding:30px;border-radius:20px;margin-bottom:25px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
        .card{background:var(--card-bg);border-radius:16px;overflow:hidden}
        .img{height:160px;background:linear-gradient(135deg, rgba(244,206,105,.25), rgba(15,23,42,.85));display:flex;align-items:center;justify-content:center}
        .img i{font-size:36px;color:var(--primary-gold)}
        .content{padding:18px}
        .title{font-size:18px;font-weight:700;margin-bottom:6px}
        .meta{color:var(--text-gray);font-size:13px;margin-bottom:10px}
        .stats{display:flex;gap:10px;margin-bottom:12px}
        .badge{background:var(--light-navy);padding:6px 10px;border-radius:10px;font-size:12px}
        .cta{width:100%;padding:10px;background:var(--primary-gold);color:var(--dark-navy);border:none;border-radius:10px;font-weight:700;cursor:pointer}
        @media(max-width:1024px){.sidebar{display:none}.main{margin:0;padding:20px}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">ClubRRRR</div>
        <ul class="nav-menu">
            <li><a class="nav-link" href="user-dashboard.html"><i class="fas fa-home"></i> דשבורד</a></li>
            <li><a class="nav-link active" href="investments.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
            <li><a class="nav-link" href="services.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
            <li><a class="nav-link" href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
            <li><a class="nav-link" href="events.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button>
    </aside>
    <main class="main">
        <div class="header">
            <h1>הזדמנויות השקעה</h1>
            <p style="color:var(--text-gray)">גלה עסקאות רלוונטיות עם נתונים אינטראקטיביים</p>
            <div id="welcomeUser" style="color:var(--text-gray); margin-top:8px;"></div>
        </div>
        <div class="grid" id="dealsGrid"></div>
    </main>
    <script src="auth-guard.js"></script>
    <script>
        const deals = [
            { icon:'fa-store', title:'מרכז קניות בטקסס', meta:'אוסטין • מסחרי', yield:'14%', price:'$5,000,000' },
            { icon:'fa-building', title:'קומפלקס מגורים במיאמי', meta:'מיאמי • מגורים', yield:'12%', price:'$2,500,000' },
            { icon:'fa-house-chimney', title:'פרויקט פיתוח וגירעין', meta:"ג'ורג'יה • פיתוח", yield:'18%', price:'$8,000,000' }
        ];

        function loadUser() {
            const user = getCurrentUser();
            if (user) {
                const stats = user.stats || {};
                document.getElementById('welcomeUser').textContent = `מומלץ עבורך, ${user.name.split(' ')[0]} • השקעות פעילות: ${stats.investments || 0}`;
            }
        }

        function renderDeals() {
            const grid = document.getElementById('dealsGrid');
            grid.innerHTML = deals.map(d => `
                <div class="card">
                    <div class="img"><i class="fas ${d.icon}"></i></div>
                    <div class="content">
                        <div class="title">${d.title}</div>
                        <div class="meta">${d.meta}</div>
                        <div class="stats">
                            <span class="badge">תשואה צפויה ${d.yield}</span>
                            <span class="badge">${d.price}</span>
                        </div>
                        <button class="cta" onclick="alert('בדיקת נאותות תתווסף בקרוב')">פתח פרטי עסקה</button>
                    </div>
                </div>`).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadUser();
            renderDeals();
        });
    </script>
</body>
</html>
