<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>השקעות - ClubRRRR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold:#F4CE69; --dark-navy:#1E293B; --light-navy:#334155; --bg-dark:#0F172A; --card-bg:#1E293B; --text-white:#F8FAFC; --text-gray:#CBD5E1; --success:#10B981; }
        body { font-family:'Heebo',sans-serif; background:var(--bg-dark); color:var(--text-white); min-height:100vh; }
        .sidebar{position:fixed;right:0;top:0;width:280px;height:100vh;background:var(--dark-navy);padding:30px 20px;overflow-y:auto;z-index:1000}
        .logo{font-size:28px;font-weight:800;color:var(--primary-gold);text-align:center;margin-bottom:10px}
        .nav-menu{list-style:none}
        .nav-link{display:flex;align-items:center;gap:12px;padding:14px 18px;color:var(--text-gray);text-decoration:none;border-radius:12px;font-size:14px}
        .nav-link:hover,.nav-link.active{background:var(--light-navy);color:var(--primary-gold)}
        .logout-btn{margin-top:20px;width:100%;padding:14px;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid #EF4444;border-radius:12px;cursor:pointer;font-weight:600}
        .main{margin-right:280px;padding:40px}
        .page-header{display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between;margin-bottom:25px}
        .title-wrap h1{margin:0;font-size:32px;font-weight:800}
        .title-wrap p{margin:6px 0 0;color:var(--text-gray)}
        .admin-add-btn{display:none;padding:8px 16px;background:rgba(244,206,105,0.15);border:1px solid var(--primary-gold);color:var(--primary-gold);border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:all 0.3s}
        .admin-add-btn:hover{background:rgba(244,206,105,0.25)}
        .admin-add-btn.show{display:block}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:var(--card-bg);padding:18px;border-radius:14px;text-align:center}
        .stat-value{font-size:28px;font-weight:800;color:var(--primary-gold)}
        .stat-label{color:var(--text-gray);font-size:13px}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax:auto;280px,1fr));gap:16px}
        .card{background:var(--card-bg);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
        .card-image{width:100%;height:180px;background:linear-gradient(135deg,#F4CE69,#EFBB43);display:flex;align-items:center;justify-content:center;color:var(--dark-navy);font-size:60px;position:relative;overflow:hidden}
        .card-image img{width:100%;height:100%;object-fit:cover}
        .deal-badge{position:absolute;top:10px;left:10px;background:var(--primary-gold);color:var(--dark-navy);padding:8px 12px;border-radius:6px;font-weight:700;font-size:12px}
        .card-content{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
        .card-title{font-weight:700;font-size:16px;color:var(--text-white)}
        .card-meta{color:var(--text-gray);font-size:13px;display:flex;gap:8px;align-items:center}
        .card-description{color:var(--text-gray);font-size:13px;line-height:1.4}
        .deal-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 0;border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08)}
        .stat-item{display:flex;flex-direction:column;gap:4px}
        .stat-item-label{color:var(--text-gray);font-size:12px}
        .stat-item-value{color:var(--primary-gold);font-weight:700}
        .progress-container{display:flex;gap:8px;align-items:center;margin:10px 0}
        .progress-bar{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
        .progress-fill{height:100%;background:var(--primary-gold)}
        .progress-text{color:var(--text-gray);font-size:12px;min-width:45px;text-align:left}
        .card-actions{display:flex;gap:8px;margin-top:auto}
        .btn{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:var(--light-navy);color:var(--text-white);cursor:pointer;font-weight:600;font-size:13px}
        .btn.primary{background:var(--primary-gold);color:var(--dark-navy);border:none}
        .btn.danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid #EF4444}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:var(--card-bg);border-radius:14px;padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-header h2{margin:0;color:var(--text-white)}
        .modal-close{background:none;border:none;color:var(--text-white);font-size:24px;cursor:pointer}
        .form-group{margin-bottom:15px;display:flex;flex-direction:column}
        .form-group label{color:var(--text-gray);font-size:13px;margin-bottom:6px}
        .form-group input,.form-group textarea,.form-group select{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:var(--light-navy);color:var(--text-white);font-family:'Heebo',sans-serif}
        .form-group textarea{resize:vertical;min-height:80px}
        .form-actions{display:flex;gap:8px;margin-top:20px}
        .admin-btn{position:absolute;top:10px;left:10px;background:var(--primary-gold);color:var(--dark-navy);border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px}
        @media(max-width:1024px){.sidebar{display:none}.main{margin:0;padding:20px}.cards{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">ClubRRRR</div>
        <ul class="nav-menu">
            <li><a class="nav-link" href="user-dashboard.html"><i class="fas fa-home"></i> דשבורד</a></li>
            <li><a class="nav-link active" href="investments.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
            <li><a class="nav-link" href="services.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
            <li><a class="nav-link" href="ai-tools.html"><i class="fas fa-robot"></i> כלים טכנולוגיים</a></li>
            <li><a class="nav-link" href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
            <li><a class="nav-link" href="events.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
            <li><a class="nav-link" href="community.html"><i class="fas fa-users"></i> קהילה</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="title-wrap">
                <h1>עסקאות להשקעה</h1>
                <p>הזדמנויות השקעה מובחרות עם פוטנציאל רווח גבוה</p>
            </div>
            <button class="admin-add-btn" id="addDealBtn"><i class="fas fa-plus"></i> הוסף עסקה</button>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="totalDeals">4</div><div class="stat-label">סה"כ עסקאות</div></div>
            <div class="stat-card"><div class="stat-value" id="investedDeals">0</div><div class="stat-label">עסקאות שהשקעת</div></div>
            <div class="stat-card"><div class="stat-value" id="totalCapital">$18.7M</div><div class="stat-label">הון משותף</div></div>
            <div class="stat-card"><div class="stat-value" id="avgYield">14%</div><div class="stat-label">תשואה ממוצעת</div></div>
        </div>

        <div id="dealsContainer" class="cards"></div>
    </main>

    <!-- Edit Deal Modal -->
    <div id="dealModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">הוסף עסקה חדשה</h2>
                <button class="modal-close" onclick="closeDealModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>שם הנכס</label>
                <input type="text" id="dealTitle" placeholder="שם הנכס">
            </div>
            <div class="form-group">
                <label>תיאור</label>
                <textarea id="dealDescription" placeholder="תיאור מפורט של הנכס והעסקה"></textarea>
            </div>
            <div class="form-group">
                <label>מיקום</label>
                <input type="text" id="dealLocation" placeholder="עיר, מדינה">
            </div>
            <div class="form-group">
                <label>סכום השקעה מינימלי</label>
                <input type="text" id="dealAmount" placeholder="$500,000">
            </div>
            <div class="form-group">
                <label>תשואה משוערת (%)</label>
                <input type="number" id="dealYield" placeholder="14">
            </div>
            <div class="form-group">
                <label>קיבולת מקסימלית ($)</label>
                <input type="text" id="dealCapacity" placeholder="$10,000,000">
            </div>
            <div class="form-group">
                <label>סכום הושקע כבר ($)</label>
                <input type="text" id="dealRaised" placeholder="$6,500,000">
            </div>
            <div class="form-group">
                <label>משך ההשקעה (שנים)</label>
                <input type="number" id="dealDuration" placeholder="3">
            </div>
            <div class="form-group">
                <label>קישור תמונה (URL)</label>
                <input type="text" id="dealImage" placeholder="https://...">
            </div>
            <div class="form-actions">
                <button class="btn" onclick="closeDealModal()">ביטול</button>
                <button class="btn primary" id="saveDealBtn" onclick="saveDeal()">שמור</button>
            </div>
        </div>
    </div>

    <script src="auth-guard.js"></script>
    <script>
        let deals = [
            { id:1, title:'מרכז קניות בטקסס', description:'מרכז קניות AAA עם דיירים יציבים בדלאס', location:'דלאס, טקסס', amount:'$500K', yield:14, capacity:10000000, raised:6500000, duration:3, image:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=250&fit=crop' },
            { id:2, title:'דיור משפחתי בפלורידה', description:'קומפלקס דיור משפחתי עם פוטנציאל כשדה ביתי', location:'מיאמי, פלורידה', amount:'$250K', yield:12, capacity:4500000, raised:2025000, duration:4, image:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=250&fit=crop' },
            { id:3, title:'בניין משרדים באטלנטה', description:'בניין משרדים מודרני באזור עסקי ראשי', location:'אטלנטה, ג\'ורג\'יה', amount:'$1M', yield:18, capacity:15000000, raised:12750000, duration:5, image:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=250&fit=crop' },
            { id:4, title:'מחסן לוגיסטיקה בטקסס', description:'מחסן כיתה A עם חוזה ארוך טווח', location:'יוסטון, טקסס', amount:'$300K', yield:11, capacity:5200000, raised:2080000, duration:3, image:'https://images.unsplash.com/photo-1552664730-d307ca884978?w=400&h=250&fit=crop' }
        ];
        let currentEditId = null;

        function isAdmin() { return getCurrentUser()?.role === 'admin'; }

        function parseAmount(str) { return parseInt(str.replace(/[$,]/g, '')) || 0; }
        function formatAmount(num) { return '$' + num.toLocaleString(); }

        function renderDeals() {
            const container = document.getElementById('dealsContainer');
            container.innerHTML = deals.map(d => {
                const capacity = parseAmount(d.capacity.toString());
                const raised = parseAmount(d.raised.toString());
                const progress = Math.round((raised / capacity) * 100);
                return `
                <div class="card">
                    <div class="card-image" style="position:relative">
                        <img src="${d.image}" alt="${d.title}" style="width:100%;height:100%;object-fit:cover">
                        <div class="deal-badge">${d.yield}% תשואה</div>
                        ${isAdmin() ? `<button class="admin-btn" onclick="editDeal(${d.id})"><i class="fas fa-edit"></i> ערוך</button>` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${d.title}</div>
                        <div class="card-meta">
                            <i class="fas fa-map-marker-alt"></i> ${d.location}
                        </div>
                        <div class="card-description">${d.description}</div>
                        <div class="deal-stats">
                            <div class="stat-item">
                                <div class="stat-item-label">השקעה מינימלית</div>
                                <div class="stat-item-value">${d.amount}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-item-label">משך</div>
                                <div class="stat-item-value">${d.duration} שנים</div>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width:${progress}%"></div>
                            </div>
                            <div class="progress-text">${progress}%</div>
                        </div>
                        <div class="card-actions">
                            <button class="btn" onclick="alert('צפה בפרטים מלאים של העסקה')"><i class="fas fa-info-circle"></i> פרטים</button>
                            <button class="btn primary" onclick="investDeal(${d.id})"><i class="fas fa-dollar-sign"></i> השקע</button>
                            ${isAdmin() ? `<button class="btn danger" onclick="deleteDeal(${d.id})"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function editDeal(id) {
            const deal = deals.find(d => d.id === id);
            if (!deal) return;
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'ערוך עסקה';
            document.getElementById('dealTitle').value = deal.title;
            document.getElementById('dealDescription').value = deal.description;
            document.getElementById('dealLocation').value = deal.location;
            document.getElementById('dealAmount').value = deal.amount;
            document.getElementById('dealYield').value = deal.yield;
            document.getElementById('dealCapacity').value = formatAmount(deal.capacity);
            document.getElementById('dealRaised').value = formatAmount(deal.raised);
            document.getElementById('dealDuration').value = deal.duration;
            document.getElementById('dealImage').value = deal.image;
            document.getElementById('dealModal').classList.add('active');
        }

        function saveDeal() {
            const newDeal = {
                title: document.getElementById('dealTitle').value,
                description: document.getElementById('dealDescription').value,
                location: document.getElementById('dealLocation').value,
                amount: document.getElementById('dealAmount').value,
                yield: parseInt(document.getElementById('dealYield').value) || 0,
                capacity: parseAmount(document.getElementById('dealCapacity').value),
                raised: parseAmount(document.getElementById('dealRaised').value),
                duration: parseInt(document.getElementById('dealDuration').value) || 0,
                image: document.getElementById('dealImage').value
            };

            if (currentEditId) {
                const deal = deals.find(d => d.id === currentEditId);
                Object.assign(deal, newDeal);
            } else {
                newDeal.id = Math.max(...deals.map(d => d.id), 0) + 1;
                deals.push(newDeal);
            }
            closeDealModal();
            renderDeals();
        }

        function deleteDeal(id) {
            if (confirm('האם אתה בטוח?')) {
                deals = deals.filter(d => d.id !== id);
                renderDeals();
            }
        }

        function investDeal(id) {
            const user = getCurrentUser();
            if (!user) { alert('אתה צריך להתחבר תחילה'); return; }
            if (!user.investments) user.investments = [];
            if (!user.investments.includes(id)) {
                user.investments.push(id);
                localStorage.setItem('clubrrrr_user', JSON.stringify(user));
                document.getElementById('investedDeals').textContent = user.investments.length;
                alert('הצטרפת להשקעה בהצלחה!');
            } else {
                alert('אתה כבר משקיע בעסקה זו');
            }
        }

        function openDealModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'הוסף עסקה חדשה';
            document.getElementById('dealTitle').value = '';
            document.getElementById('dealDescription').value = '';
            document.getElementById('dealLocation').value = '';
            document.getElementById('dealAmount').value = '';
            document.getElementById('dealYield').value = '';
            document.getElementById('dealCapacity').value = '';
            document.getElementById('dealRaised').value = '';
            document.getElementById('dealDuration').value = '';
            document.getElementById('dealImage').value = '';
            document.getElementById('dealModal').classList.add('active');
        }

        function closeDealModal() { document.getElementById('dealModal').classList.remove('active'); }

        document.getElementById('addDealBtn').addEventListener('click', () => {
            if (!isAdmin()) { alert('רק מנהלים יכולים להוסיף עסקאות'); return; }
            openDealModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            if (isAdmin()) {
                document.getElementById('addDealBtn').classList.add('show');
            }
            const user = getCurrentUser();
            if (user && user.investments) {
                document.getElementById('investedDeals').textContent = user.investments.length;
            }
            document.getElementById('avgYield').textContent = Math.round(deals.reduce((sum, d) => sum + d.yield, 0) / deals.length) + '%';
            renderDeals();
        });
    </script>
</body>
</html>
