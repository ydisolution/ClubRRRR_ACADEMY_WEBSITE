<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - ClubRRRR ACADEMY</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Accessibility Module -->
    <link rel="stylesheet" href="accessibility.css">
    
    <!-- Language Switcher -->
    <link rel="stylesheet" href="language-switcher.css">
    
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-color: #DFB249;
            --dark-bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #FFFFFF;
            --text-gray: #CCCCCC;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1a1a1a 100%);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container img {
            height: 80px;
            width: auto;
            margin-bottom: 20px;
        }

        .logo-container h1 {
            font-size: 1.8rem;
            color: var(--gold-color);
            margin-bottom: 10px;
        }

        .logo-container p {
            color: var(--text-gray);
            font-size: 1rem;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(223, 178, 73, 0.2);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(223, 178, 73, 0.2);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 1rem;
            font-family: 'Jost', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--gold-color);
            border-bottom-color: var(--gold-color);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-white);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid rgba(223, 178, 73, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--text-white);
            font-size: 1rem;
            font-family: 'Jost', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--gold-color);
            box-shadow: 0 0 0 3px rgba(223, 178, 73, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(204, 204, 204, 0.5);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            cursor: pointer;
            transition: color 0.3s;
        }

        .password-toggle i:hover {
            color: var(--gold-color);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--gold-color);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .forgot-password:hover {
            opacity: 0.8;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-color);
            color: var(--dark-bg);
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Jost', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(223, 178, 73, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(223, 178, 73, 0.2);
        }

        .divider span {
            padding: 0 15px;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px;
            border: 1px solid rgba(223, 178, 73, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }

        .social-btn:hover {
            border-color: var(--gold-color);
            background: rgba(223, 178, 73, 0.1);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1.3rem;
        }

        .google-btn {
            background: #fff;
            color: #333;
            border-color: #ddd;
        }

        .google-btn:hover {
            background: #f8f8f8;
            border-color: var(--gold-color);
            color: #333;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-gray);
            font-size: 0.95rem;
        }

        .signup-link a {
            color: var(--gold-color);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }

        .signup-link a:hover {
            opacity: 0.8;
        }

        .back-home {
            text-align: center;
            margin-top: 20px;
        }

        .back-home a {
            color: var(--text-gray);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-home a:hover {
            color: var(--gold-color);
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }

        .alert.error {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
        }

        @media (max-width: 768px) {
            .login-card {
                padding: 30px 20px;
            }

            .logo-container h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="logo-container">
            <a href="web_PM__index.html">
                <img src="./ClubRRRRnew logo.png" alt="ClubRRRR ACADEMY">
            </a>
            <h1>ברוך הבא חזרה!</h1>
            <p>התחבר לאזור האישי שלך</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <!-- Alert -->
            <div id="alert" class="alert"></div>

            <!-- Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">אימייל</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">סיסמה</label>
                    <div class="password-toggle">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            required
                        >
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>זכור אותי</span>
                    </label>
                    <a href="#" class="forgot-password">שכחת סיסמה?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> התחבר
                </button>
            </form>

            <!-- Divider -->
            <div class="divider">
                <span>או התחבר עם</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn google-btn" id="googleLoginBtn">
                    <i class="fab fa-google"></i>
                    המשך עם Google
                </button>
            </div>

            <!-- Signup Link -->
            <div class="signup-link">
                עדיין אין לך חשבון? <a href="register.html">הירשם עכשיו</a>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="back-home">
            <a href="web_PM__index.html">
                <i class="fas fa-arrow-right"></i>
                חזרה לדף הבית
            </a>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Password Toggle
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const icon = this;
            
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Login Form Submit
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            // Check for admin login
            if (email === 'admin' && password === 'Admin2212!') {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> מתחבר כמנהל...';
                
                // Save admin session
                sessionStorage.setItem('clubrrrrAdmin', 'true');
                sessionStorage.setItem('adminLoginTime', Date.now());
                
                showAlert('התחברת כמנהל! מעביר אותך...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin-panel.html';
                }, 1500);
                return;
            }
            
            // Validate email
            if (!email || !password) {
                showAlert('נא למלא את כל השדות', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> מתחבר...';
            
            // התחברות עם מערכת החדשה
            const result = authGuard.login(email, password);
            
            if (result.success) {
                showAlert('התחברת בהצלחה! מעביר אותך...', 'success');
                setTimeout(() => {
                    authGuard.redirectAfterLogin();
                }, 1500);
            } else {
                showAlert(result.message || 'אימייל או סיסמה שגויים', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> התחבר';
            }
        });

        // Google Login
        document.getElementById('googleLoginBtn').addEventListener('click', async function() {
            // Simulate Google OAuth (in production, use Firebase or Google Identity)
            const mockGoogleUser = {
                email: 'user@gmail.com',
                displayName: 'משתמש Google'
            };
            
            const result = authGuard.loginWithGoogle(mockGoogleUser);
            if (result.success) {
                showAlert('התחברת בהצלחה עם Google!', 'success');
                setTimeout(() => {
                    authGuard.redirectAfterLogin();
                }, 1200);
            } else {
                showAlert('שגיאה בהתחברות עם Google', 'error');
            }
        });

        // Show Alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Check if already logged in
        if (authGuard.isAuthenticated()) {
            window.location.href = 'user-dashboard.html';
        }
    </script>
    
    <!-- Auth Guard -->
    <script src="auth-guard.js"></script>
    
    <!-- Language Switcher -->
    <script src="translations.js"></script>
    <script src="language-switcher.js"></script>
    
    <!-- Accessibility Module -->
    <script src="accessibility.js"></script>
</body>
</html>
