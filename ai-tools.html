<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כלים טכנולוגיים - ClubRRRR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-gold:#F4CE69; --dark-navy:#1E293B; --light-navy:#334155; --bg-dark:#0F172A; --card-bg:#1E293B; --text-white:#F8FAFC; --text-gray:#CBD5E1; --success:#10B981; }
        body { font-family:'Heebo',sans-serif; background:var(--bg-dark); color:var(--text-white); min-height:100vh; }
        .sidebar{position:fixed;right:0;top:0;width:280px;height:100vh;background:var(--dark-navy);padding:30px 20px;overflow-y:auto;z-index:1000}
        .logo{font-size:28px;font-weight:800;color:var(--primary-gold);text-align:center;margin-bottom:10px}
        .nav-menu{list-style:none}
        .nav-link{display:flex;align-items:center;gap:12px;padding:14px 18px;color:var(--text-gray);text-decoration:none;border-radius:12px;font-size:14px}
        .nav-link:hover,.nav-link.active{background:var(--light-navy);color:var(--primary-gold)}
        .logout-btn{margin-top:20px;width:100%;padding:14px;background:rgba(239,68,68,.1);color:#EF4444;border:1px solid #EF4444;border-radius:12px;cursor:pointer;font-weight:600}
        .main{margin-right:280px;padding:40px}
        .page-header{display:flex;flex-wrap:wrap;gap:20px;align-items:center;justify-content:space-between;margin-bottom:25px}
        .title-wrap h1{margin:0;font-size:32px;font-weight:800}
        .title-wrap p{margin:6px 0 0;color:var(--text-gray)}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
        .stat-card{background:var(--card-bg);padding:18px;border-radius:14px;text-align:center}
        .stat-value{font-size:28px;font-weight:800;color:var(--primary-gold)}
        .stat-label{color:var(--text-gray);font-size:13px}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
        .card{background:var(--card-bg);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
        .card-image{width:100%;height:180px;background:linear-gradient(135deg,#F4CE69,#EFBB43);display:flex;align-items:center;justify-content:center;color:var(--dark-navy);font-size:60px;position:relative;overflow:hidden}
        .card-image img{width:100%;height:100%;object-fit:cover}
        .tool-badge{position:absolute;top:10px;left:10px;background:var(--primary-gold);color:var(--dark-navy);padding:6px 12px;border-radius:6px;font-weight:700;font-size:11px}
        .card-content{padding:18px;display:flex;flex-direction:column;gap:10px;flex:1}
        .card-title{font-weight:700;font-size:16px;color:var(--text-white)}
        .card-meta{color:var(--text-gray);font-size:13px;display:flex;gap:8px;align-items:center}
        .card-description{color:var(--text-gray);font-size:13px;line-height:1.4}
        .features{padding:10px 0;border-top:1px solid rgba(255,255,255,0.08);border-bottom:1px solid rgba(255,255,255,0.08)}
        .feature-item{display:flex;gap:8px;align-items:center;font-size:13px;padding:6px 0;color:var(--text-gray)}
        .feature-item i{color:var(--success)}
        .card-actions{display:flex;gap:8px;margin-top:auto}
        .btn{flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.15);background:var(--light-navy);color:var(--text-white);cursor:pointer;font-weight:600;font-size:13px}
        .btn.primary{background:var(--primary-gold);color:var(--dark-navy);border:none}
        .btn.danger{background:rgba(239,68,68,.1);color:#EF4444;border:1px solid #EF4444}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:var(--card-bg);border-radius:14px;padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-header h2{margin:0;color:var(--text-white)}
        .modal-close{background:none;border:none;color:var(--text-white);font-size:24px;cursor:pointer}
        .form-group{margin-bottom:15px;display:flex;flex-direction:column}
        .form-group label{color:var(--text-gray);font-size:13px;margin-bottom:6px}
        .form-group input,.form-group textarea,.form-group select{padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:var(--light-navy);color:var(--text-white);font-family:'Heebo',sans-serif}
        .form-group textarea{resize:vertical;min-height:80px}
        .form-actions{display:flex;gap:8px;margin-top:20px}
        .admin-btn{position:absolute;top:10px;left:10px;background:var(--primary-gold);color:var(--dark-navy);border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;z-index:10}
        @media(max-width:1024px){.sidebar{display:none}.main{margin:0;padding:20px}.cards{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}}
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">ClubRRRR</div>
        <ul class="nav-menu">
            <li><a class="nav-link" href="user-dashboard.html"><i class="fas fa-home"></i> דשבורד</a></li>
            <li><a class="nav-link" href="investments.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
            <li><a class="nav-link" href="services.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
            <li><a class="nav-link active" href="ai-tools.html"><i class="fas fa-robot"></i> כלים טכנולוגיים</a></li>
            <li><a class="nav-link" href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
            <li><a class="nav-link" href="events.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
            <li><a class="nav-link" href="community.html"><i class="fas fa-users"></i> קהילה</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button>
    </aside>

    <main class="main">
        <div class="page-header">
            <div class="title-wrap">
                <h1>כלים טכנולוגיים</h1>
                <p>כלי AI וטכנולוגיה מתקדמים לניהול נדל"ן</p>
            </div>
            <button class="btn primary" id="addToolBtn"><i class="fas fa-plus"></i> הוסף כלי חדש</button>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="totalTools">6</div><div class="stat-label">סה"כ כלים</div></div>
            <div class="stat-card"><div class="stat-value" id="freeTools">2</div><div class="stat-label">כלים חינמיים</div></div>
            <div class="stat-card"><div class="stat-value" id="premiumTools">4</div><div class="stat-label">כלים פרימיום</div></div>
            <div class="stat-card"><div class="stat-value" id="activeUsers">342</div><div class="stat-label">משתמשים פעילים</div></div>
        </div>

        <div id="toolsContainer" class="cards"></div>
    </main>

    <!-- Edit Tool Modal -->
    <div id="toolModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">הוסף כלי חדש</h2>
                <button class="modal-close" onclick="closeToolModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>שם הכלי</label>
                <input type="text" id="toolName" placeholder="שם הכלי">
            </div>
            <div class="form-group">
                <label>תיאור</label>
                <textarea id="toolDescription" placeholder="תיאור מפורט של הכלי"></textarea>
            </div>
            <div class="form-group">
                <label>סוג</label>
                <select id="toolType">
                    <option value="AI">AI</option>
                    <option value="ניתוח נתונים">ניתוח נתונים</option>
                    <option value="אוטומציה">אוטומציה</option>
                    <option value="תקשורת">תקשורת</option>
                </select>
            </div>
            <div class="form-group">
                <label>מחיר (בדולרים, 0 לחינמי)</label>
                <input type="number" id="toolPrice" placeholder="0">
            </div>
            <div class="form-group">
                <label>תכונות (הפרד בפסיקים)</label>
                <input type="text" id="toolFeatures" placeholder="תכונה 1, תכונה 2, תכונה 3">
            </div>
            <div class="form-group">
                <label>קישור לכלי</label>
                <input type="text" id="toolUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>קישור תמונה (URL)</label>
                <input type="text" id="toolImage" placeholder="https://...">
            </div>
            <div class="form-actions">
                <button class="btn" onclick="closeToolModal()">ביטול</button>
                <button class="btn primary" id="saveToolBtn" onclick="saveTool()">שמור</button>
            </div>
        </div>
    </div>

    <script src="auth-guard.js"></script>
    <script>
        let tools = [
            { id:1, name:'AI Deal Analyzer', description:'ניתוח אוטומטי של עסקאות נדל"ן באמצעות בינה מלאכותית', type:'AI', price:0, features:['ניתוח ROI אוטומטי','דוחות מפורטים','השוואת נכסים'], url:'#', image:'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&h=250&fit=crop' },
            { id:2, name:'Property Valuation AI', description:'הערכת שווי נכסים מבוססת AI עם דיוק גבוה', type:'AI', price:49, features:['הערכה מדויקת','ניתוח שוק','תחזיות מחיר'], url:'#', image:'https://images.unsplash.com/photo-1639322537228-f710d846310a?w=400&h=250&fit=crop' },
            { id:3, name:'Market Trend Tracker', description:'מעקב אחר מגמות שוק בזמן אמת', type:'ניתוח נתונים', price:0, features:['גרפים אינטראקטיביים','התראות מחיר','ניתוח היסטורי'], url:'#', image:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400&h=250&fit=crop' },
            { id:4, name:'Document Automation', description:'אוטומציה של מסמכים משפטיים וחוזים', type:'אוטומציה', price:79, features:['תבניות מוכנות','חתימות דיגיטליות','אחסון ענן'], url:'#', image:'https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=400&h=250&fit=crop' },
            { id:5, name:'Tenant Communication Hub', description:'מערכת תקשורת מרכזית עם דיירים', type:'תקשורת', price:29, features:['צ\'אט בזמן אמת','ניהול תשלומים','פורטל דיירים'], url:'#', image:'https://images.unsplash.com/photo-1611224923853-80b023f02d71?w=400&h=250&fit=crop' },
            { id:6, name:'Investment Calculator Pro', description:'מחשבון השקעות מתקדם לנדל"ן', type:'ניתוח נתונים', price:99, features:['חישובי ROI','סימולציות','דוחות פיננסיים'], url:'#', image:'https://images.unsplash.com/photo-1554224155-8d04cb21cd6c?w=400&h=250&fit=crop' }
        ];
        let currentEditId = null;

        function isAdmin() { return getCurrentUser()?.role === 'admin'; }

        function renderTools() {
            const container = document.getElementById('toolsContainer');
            container.innerHTML = tools.map(t => {
                const priceText = t.price === 0 ? 'חינם' : `$${t.price}/חודש`;
                const badgeColor = t.price === 0 ? 'background:#10B981' : 'background:#F4CE69';
                return `
                <div class="card">
                    <div class="card-image" style="position:relative">
                        <img src="${t.image}" alt="${t.name}" style="width:100%;height:100%;object-fit:cover">
                        <div class="tool-badge" style="${badgeColor}">${t.type}</div>
                        ${isAdmin() ? `<button class="admin-btn" onclick="editTool(${t.id})"><i class="fas fa-edit"></i> ערוך</button>` : ''}
                    </div>
                    <div class="card-content">
                        <div class="card-title">${t.name}</div>
                        <div class="card-description">${t.description}</div>
                        <div class="features">
                            ${t.features.map(f => `<div class="feature-item"><i class="fas fa-check"></i> ${f}</div>`).join('')}
                        </div>
                        <div class="card-meta" style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px">
                            <strong style="color:var(--primary-gold)">${priceText}</strong>
                        </div>
                        <div class="card-actions">
                            <button class="btn" onclick="window.open('${t.url}', '_blank')"><i class="fas fa-info-circle"></i> פרטים</button>
                            <button class="btn primary" onclick="useTool(${t.id})"><i class="fas fa-rocket"></i> השתמש</button>
                            ${isAdmin() ? `<button class="btn danger" onclick="deleteTool(${t.id})"><i class="fas fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function editTool(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;
            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'ערוך כלי';
            document.getElementById('toolName').value = tool.name;
            document.getElementById('toolDescription').value = tool.description;
            document.getElementById('toolType').value = tool.type;
            document.getElementById('toolPrice').value = tool.price;
            document.getElementById('toolFeatures').value = tool.features.join(', ');
            document.getElementById('toolUrl').value = tool.url;
            document.getElementById('toolImage').value = tool.image;
            document.getElementById('toolModal').classList.add('active');
        }

        function saveTool() {
            const newTool = {
                name: document.getElementById('toolName').value,
                description: document.getElementById('toolDescription').value,
                type: document.getElementById('toolType').value,
                price: parseInt(document.getElementById('toolPrice').value) || 0,
                features: document.getElementById('toolFeatures').value.split(',').map(f => f.trim()),
                url: document.getElementById('toolUrl').value,
                image: document.getElementById('toolImage').value
            };

            if (currentEditId) {
                const tool = tools.find(t => t.id === currentEditId);
                Object.assign(tool, newTool);
            } else {
                newTool.id = Math.max(...tools.map(t => t.id), 0) + 1;
                tools.push(newTool);
            }
            updateStats();
            closeToolModal();
            renderTools();
        }

        function deleteTool(id) {
            if (confirm('האם אתה בטוח?')) {
                tools = tools.filter(t => t.id !== id);
                updateStats();
                renderTools();
            }
        }

        function useTool(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;
            if (tool.url && tool.url !== '#') {
                window.open(tool.url, '_blank');
            } else {
                alert(`פתיחת ${tool.name}...`);
            }
        }

        function openToolModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'הוסף כלי חדש';
            document.getElementById('toolName').value = '';
            document.getElementById('toolDescription').value = '';
            document.getElementById('toolType').value = 'AI';
            document.getElementById('toolPrice').value = '';
            document.getElementById('toolFeatures').value = '';
            document.getElementById('toolUrl').value = '';
            document.getElementById('toolImage').value = '';
            document.getElementById('toolModal').classList.add('active');
        }

        function closeToolModal() { document.getElementById('toolModal').classList.remove('active'); }

        function updateStats() {
            document.getElementById('totalTools').textContent = tools.length;
            document.getElementById('freeTools').textContent = tools.filter(t => t.price === 0).length;
            document.getElementById('premiumTools').textContent = tools.filter(t => t.price > 0).length;
        }

        document.getElementById('addToolBtn').addEventListener('click', () => {
            if (!isAdmin()) { alert('רק מנהלים יכולים להוסיף כלים'); return; }
            openToolModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            renderTools();
        });
    </script>
</body>
</html>
