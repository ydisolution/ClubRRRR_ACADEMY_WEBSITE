<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>שירותים מקצועיים - ClubRRRR</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold-color: #DFB249;
            --dark-bg: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-white: #FFFFFF;
            --text-gray: #CCCCCC;
        }
        
        body {
            font-family: 'Jost', sans-serif;
            background: var(--dark-bg);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .main-header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(18px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: var(--gold-color);
        }

        .nav-menu {
            display: flex;
            gap: 40px;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
            padding: 10px 0;
            display: block;
        }

        .nav-menu a:hover {
            color: var(--gold-color);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: 0;
            width: 0;
            height: 2px;
            background: var(--gold-color);
            transition: width 0.3s;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .logout-btn {
            background: linear-gradient(135deg, var(--gold-color) 0%, #F4D88A 100%);
            color: var(--dark-bg) !important;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .logout-btn::after {
            display: none !important;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(223, 178, 73, 0.4);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInUp 1s ease-out;
        }

        .section-header h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .section-header p {
            font-size: 18px;
            color: var(--text-gray);
            max-width: 700px;
            margin: 0 auto;
        }

        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }

        .service-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(223, 178, 73, 0.15);
            border-color: var(--gold-color);
        }

        .service-header {
            padding: 40px 30px;
            background: linear-gradient(135deg, rgba(223, 178, 73, 0.15) 0%, rgba(223, 178, 73, 0.05) 100%);
            text-align: center;
            border-bottom: 1px solid rgba(223, 178, 73, 0.2);
        }

        .service-icon {
            font-size: 42px;
            color: var(--gold-color);
            margin-bottom: 12px;
        }

        .service-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .service-provider {
            font-size: 13px;
            color: var(--text-gray);
        }

        .service-content {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .service-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .service-stars {
            color: var(--gold-color);
            font-size: 12px;
        }

        .service-expertise {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(223, 178, 73, 0.2);
        }

        .expertise-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .expertise-item i {
            color: var(--gold-color);
            font-size: 12px;
        }

        .service-price {
            background: rgba(223, 178, 73, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .service-price-label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .service-price-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-color);
        }

        .service-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .service-btn {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .service-btn-secondary {
            background: transparent;
            color: var(--gold-color);
            border: 2px solid rgba(223, 178, 73, 0.3);
        }

        .service-btn-secondary:hover {
            background: rgba(223, 178, 73, 0.1);
            border-color: var(--gold-color);
        }

        .service-btn-primary {
            background: transparent;
            color: var(--gold-color);
            border: 2px solid var(--gold-color);
        }

        .service-btn-primary:hover {
            background: var(--gold-color);
            color: var(--dark-bg);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 40px 20px;
            }

            .header-container {
                padding: 0 20px;
            }

            .section-header h1 {
                font-size: 32px;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .service-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-container">
            <div class="logo-text">ClubRRRR</div>
            <nav>
                <ul class="nav-menu">
                    <li><a href="dashboard.new.html"><i class="fas fa-home"></i> דשבורד</a></li>
                    <li><a href="investments.new.html"><i class="fas fa-chart-line"></i> השקעות</a></li>
                    <li><a href="services.new.html"><i class="fas fa-briefcase"></i> שירותים</a></li>
                    <li><a href="academy.html"><i class="fas fa-graduation-cap"></i> Academy</a></li>
                    <li><a href="events.new.html"><i class="fas fa-calendar-alt"></i> אירועים</a></li>
                    <li><a href="community.html"><i class="fas fa-users"></i> קהילה</a></li>
                    <li><a href="profile.html"><i class="fas fa-user"></i> פרופיל</a></li>
                    <li><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> התנתק</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section class="section-header">
            <h1>שירותים מקצועיים</h1>
            <p>בחר מומחים שילוו אותך בעסקאות שלך</p>
        </section>

        <div class="services-grid" id="servicesGrid"></div>
    </main>

    <script src="auth-guard.js"></script>
    <script>
        const services = [
            {
                icon: '💰',
                name: 'יעוץ מס נדל"ן',
                provider: 'שרה לוי, EA',
                rating: 4.8,
                reviews: 127,
                price: '45 קרדיטים',
                expertise: ['תכנון מס מתקדם', 'אופטימיזציה אפטו', 'סטרטגיות 1031', 'דיווח IRS']
            },
            {
                icon: '📊',
                name: 'שירותי רואת חשבון',
                provider: 'Sarah Johnson, CPA',
                rating: 4.9,
                reviews: 156,
                price: '50 קרדיטים',
                expertise: ['ניהול כספים', 'דוחות שנתיים', 'תכנון מס', 'ייעוץ עסקי']
            },
            {
                icon: '🏠',
                name: 'סוכן נדל"ן',
                provider: 'Lisa Martinez Realty',
                rating: 4.7,
                reviews: 94,
                price: 'חינם לחברים',
                expertise: ['חיפוש דילים', 'ניתוח שוק', 'משא ומתן', 'סיום עסקאות']
            },
            {
                icon: '⚖️',
                name: 'ייעוץ משפטי',
                provider: 'David Cohen, Esq.',
                rating: 4.8,
                reviews: 89,
                price: '60 קרדיטים',
                expertise: ['הסכמים משפטיים', 'הגנת עסקה', 'כתב אישור', 'דרישות יתר']
            }
        ];

        function renderServices() {
            const grid = document.getElementById('servicesGrid');
            grid.innerHTML = services.map(s => `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-icon">${s.icon}</div>
                        <div class="service-name">${s.name}</div>
                        <div class="service-provider">${s.provider}</div>
                    </div>
                    <div class="service-content">
                        <div class="service-rating">
                            <span class="service-stars">★ ${s.rating}</span>
                            <span style="color: var(--text-gray);">(${s.reviews} reviews)</span>
                        </div>
                        
                        <div class="service-expertise">
                            ${s.expertise.map(e => `
                                <div class="expertise-item">
                                    <i class="fas fa-check-circle"></i>
                                    ${e}
                                </div>
                            `).join('')}
                        </div>

                        <div class="service-price">
                            <div class="service-price-label">תעריף:</div>
                            <div class="service-price-value">${s.price}</div>
                        </div>

                        <div class="service-actions">
                            <button class="service-btn service-btn-secondary" onclick="alert('צפייה בפרטים מלאים')">צפה בפרטים</button>
                            <button class="service-btn service-btn-primary" onclick="alert('קביעת פגישה')">קבע פגישה</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function logout() {
            if (typeof logoutUser === 'function') {
                logoutUser();
            }
        }

        document.addEventListener('DOMContentLoaded', renderServices);
    </script>
</body>
</html>
